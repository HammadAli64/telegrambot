<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paid Members</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <main class="container">
        <h1>Paid Members</h1>
        <section class="form-card">
            <h2>Add Member</h2>
            <input id="user-id" type="number" placeholder="Telegram user ID">
            <input id="username" type="text" placeholder="Username (optional)">
            <input id="full-name" type="text" placeholder="Full name (optional)">
            <button id="add-btn">Add</button>
            <button id="remove-btn">Remove</button>
        </section>
        <div id="members-list"></div>
    </main>
    <script src="/static/js/members.js"></script>
</body>
</html>
